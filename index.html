<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Entity Browser</title>
    <script>
        // Cold-start instrumentation — marks the moment HTML head finishes
        // parsing (just before the trunk-injected module script runs).
        // The WASM `start()` reads performance.now() and logs the delta
        // so we can attribute cold-start time to HTML/fetch/compile/init.
        performance.mark('html-parsed');

        // L1 "BIOS" gate: ?systemrecovery=1 (or bare ?systemrecovery) requests
        // the read-only System Recovery console (rendered below). Detect it
        // FIRST so the WASM-retry script + the recovery renderer both see it.
        // The matching guard in main.rs (start()) skips the WASM boot so the
        // app doesn't fight the recovery screen for the DOM.
        window.__ENTITY_RECOVERY__ = (function () {
            try {
                var v = new URLSearchParams(location.search).get('systemrecovery');
                return v === '' || v === '1' || v === 'true';
            } catch (_) { return false; }
        })();
</script>
    <!-- data-wasm-opt="z": wasm-opt -Oz (smallest). C8 shipping size pass.
         wasm-opt only runs on release builds; debug builds skip it. -->
    <link data-trunk rel="rust" data-wasm-opt="z" data-bin="entity-browser" />
    <link data-trunk rel="rust" data-wasm-opt="z" data-bin="entity-worker" data-cargo-no-default-features data-type="worker" />
    <link data-trunk rel="copy-file" href="assets/entity-worker-loader.js" />
    <link data-trunk rel="copy-file" href="assets/sw.js" />
    <script>
        // Console capture for E2E tests (tests/e2e_worker.rs).
        // Wraps `console.{log,info,warn,error,debug}` so they ALSO push to
        // `window.__entity_browser_log`. The fantoccini-driven test reads
        // this array via `execute_script` instead of relying on browser
        // dev-tools — pure runtime mechanism, no WebDriver log-API
        // dependency. Negligible overhead, always-on; consumers who don't
        // need it can ignore the global.
        (function() {
            window.__entity_browser_log = [];
            const cap = window.__entity_browser_log;
            const levels = ['log', 'info', 'warn', 'error', 'debug'];
            for (const lvl of levels) {
                const orig = console[lvl].bind(console);
                console[lvl] = function(...args) {
                    try {
                        // Stringify each arg defensively — some args may
                        // be DOM nodes, Errors, etc. that don't serialize
                        // cleanly. Best-effort capture; never throw.
                        const safe = args.map((a) => {
                            if (a === undefined) return 'undefined';
                            if (a === null) return 'null';
                            if (typeof a === 'string') return a;
                            try { return JSON.stringify(a); }
                            catch { return String(a); }
                        });
                        cap.push({ level: lvl, args: safe });
                    } catch (_) { /* swallow */ }
                    orig(...args);
                };
            }
        })();
    </script>
    <script>
        // L1 "BIOS" — System Recovery / Storage Inventory console.
        // Activated by ?systemrecovery=1 (or bare ?systemrecovery). Pure JS,
        // runs INSTEAD of the WASM app (main.rs start() bails on the same
        // param), so it works even when the peer (L2) won't boot. REPORT-ONLY:
        // performs NO writes and NO deletes. Defensive throughout — every probe
        // is independently try/caught so one unsupported API can't blank the
        // rest. Reachable offline (the SW serves the cached shell for
        // navigations via ignoreSearch; this needs no network).
        //
        // This is the full inventory ported from the standalone staging copy
        // (recovery-preview.html, kept in the repo as the dev/preview source):
        // storage summary, app-code/your-data/secret/transient categorization,
        // SW + Cache Storage, IndexedDB enumeration (opens each DB with a
        // locked-tab timeout, counts stores, flags entity-peer-* orphans),
        // masked vault, OPFS, sessionStorage.
        (function () {
            if (!window.__ENTITY_RECOVERY__) return;

            var RECOVERY_CSS = `

  html, body { margin: 0; background: #0f1115; color: #d7dce2;
    font: 14px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif;
    /* Override the app shell's full-viewport lock (#603 html,body) so the
       inventory can scroll — it's taller than the viewport. */
    height: auto; overflow: auto; }
  #entity-recovery.wrap { max-width: 860px; margin: 0 auto; padding: 28px 20px 80px; }
  #entity-recovery h1 { font-size: 19px; margin: 0 0 2px; color: #f0f3f7; }
  #entity-recovery .sub { color: #8b94a3; font-size: 12.5px; margin: 0 0 22px; }
  #entity-recovery .sub code { color: #9fb4cf; }
  #entity-recovery h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
    color: #9fb4cf; margin: 26px 0 6px; border-bottom: 1px solid #232936; padding-bottom: 5px; }
  #entity-recovery .note { color: #7e8696; font-size: 12px; margin: 0 0 12px; }
  #entity-recovery .card { background: #161a22; border: 1px solid #232936; border-radius: 8px;
    padding: 12px 14px; margin: 9px 0; }
  #entity-recovery .card .name { font-weight: 600; color: #e7ebf1; word-break: break-all; }
  #entity-recovery .card .meta { color: #8b94a3; font-size: 12.5px; margin-top: 3px; }
  #entity-recovery .kv { display: flex; flex-wrap: wrap; gap: 4px 18px; margin-top: 6px; }
  #entity-recovery .kv span { font-size: 12.5px; color: #aab2c0; }
  #entity-recovery .kv b { color: #d7dce2; font-weight: 600; }
  #entity-recovery .tag { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 10px;
    border: 1px solid currentColor; margin-left: 7px; vertical-align: middle; }
  #entity-recovery .tag.code { color: #c08a3e; } #entity-recovery .tag.data { color: #4f9d69; }
  #entity-recovery .tag.secret { color: #c0563e; } #entity-recovery .tag.transient { color: #6b7280; }
  #entity-recovery .empty { color: #6b7280; font-style: italic; padding: 4px 0; }
  #entity-recovery .err { color: #c0563e; font-size: 12.5px; }
  #entity-recovery .bar { height: 8px; background: #232936; border-radius: 5px; overflow: hidden; margin-top: 8px; }
  #entity-recovery .bar > i { display: block; height: 100%; background: #3f7bbf; }
  #entity-recovery .intro { background: #131722; border: 1px solid #232936; border-left: 3px solid #3f7bbf;
    border-radius: 8px; padding: 12px 16px; margin: 0 0 16px; }
  #entity-recovery .intro p { margin: 0 0 8px; color: #c2cad6; font-size: 13px; }
  #entity-recovery .intro p:last-child { margin-bottom: 0; }
  #entity-recovery .intro b { color: #e7ebf1; } #entity-recovery .intro code { color: #9fb4cf; }
  #entity-recovery .legend { font-size: 11.5px; color: #7e8696; margin: 4px 0 0; }
  #entity-recovery .bootnote { background: #1d1710; border: 1px solid #3a2e18;
    border-left: 3px solid #c08a3e; border-radius: 8px; padding: 12px 16px; margin: 0 0 16px; }
  #entity-recovery .bootnote p { margin: 0 0 8px; color: #d8cdbb; font-size: 13px; }
  #entity-recovery .bootnote b { color: #f0e6d4; } #entity-recovery .bootnote code { color: #d8b87a; }
  #entity-recovery .bootnote ul { margin: 0 0 8px; padding-left: 20px; }
  #entity-recovery .bootnote li { color: #d8cdbb; font-size: 13px; margin: 0 0 5px; }
  #entity-recovery .bootnote .legend { margin-top: 6px; }
  #entity-recovery .foot { margin-top: 34px; padding-top: 14px; border-top: 1px solid #232936;
    color: #6b7280; font-size: 12px; }
  #entity-recovery button.re { background: #232936; color: #cdd5e0; border: 1px solid #313a4b;
    border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 12.5px; }
`;

            var RECOVERY_BODY = `
<div class="wrap" id="entity-recovery">
  <h1>Entity Browser — Storage Inventory</h1>
  <p class="sub">Read-only &middot; origin <code id="origin">…</code> &middot; <span id="ts">…</span>
     &middot; <button class="re" onclick="location.reload()">Re-scan</button>
     &middot; <button class="re" onclick="location.href=location.pathname">Boot normally →</button></p>
  <div class="bootnote">
    <p><b>Stuck on “Loading Entity Browser…”?</b> This is almost always a <b>stale
       service worker</b> serving an old or partial cached bundle — <i>not</i> lost data.
       Your content below is intact. A plain refresh (even a hard refresh) won’t fix it:
       a reload does not replace the service worker that controls the tab.</p>
    <p><b>To recover, do one of these:</b></p>
    <ul>
      <li><b>Close every tab</b> open on this origin (<code id="origin3">…</code>), then
          open a fresh one. This lets the updated service worker take over and purge the
          stale cache automatically — the most reliable fix.</li>
      <li>Or unregister the service worker for this origin from your browser’s developer
          tools (look under “Application”, “Storage”, or “Service Workers”), then reload.</li>
      <li>Or clear site data for this origin (it only removes the cached program — your
          tree lives in IndexedDB and is listed below).</li>
    </ul>
    <p class="legend">Note: after a new version is deployed, the fix reaches a browser only
       after one <b>online</b> load — service workers update from the network.</p>
  </div>
  <div class="intro">
    <p><b>What is this?</b> Entity Browser is a <b>local-first</b> application: your content and
       your identity live in an <i>entity tree</i> stored inside <i>this browser</i> — not on a
       remote server. Each identity is a <i>peer</i>; the tree is the single source of truth, and
       the app works offline because everything it needs is already on your machine. This page is a
       read-only inventory of everything Entity Browser has saved here.</p>
    <p><b>What "here" means — scope.</b> Browsers partition storage by <b>origin</b> =
       protocol + host + <b>port</b> (this one is <code id="origin2">…</code>). Everything below
       belongs to that origin. The URL <b>path does not matter</b>: every page on this origin and
       <b>every open tab share the same storage</b> shown here. A different <b>port or domain</b> is
       a completely separate world with its own independent data.</p>
  </div>
  <p class="legend">
    <span class="tag code">app code</span> cached program, safe to discard &nbsp;
    <span class="tag data">your data</span> durable content &amp; identity &nbsp;
    <span class="tag secret">secret</span> private — value hidden &nbsp;
    <span class="tag transient">transient</span> per-tab, cleared on close
  </p>

  <h2>Storage summary</h2>
  <p class="note">What the browser thinks Entity Browser is using overall, and whether it's
     protected from automatic eviction.</p>
  <div id="summary"><div class="empty">probing…</div></div>

  <h2>App code <span class="tag code">app code</span></h2>
  <p class="note">Service Workers and Cache Storage hold the program itself (HTML / WASM / JS),
     not your data. A "hard reset" clears these; you lose nothing but a re-download.</p>
  <div id="sw"><div class="empty">probing…</div></div>
  <div id="caches"><div class="empty">probing…</div></div>

  <h2>Your data — IndexedDB <span class="tag data">your data</span></h2>
  <p class="note">The durable entity tree(s). The primary peer lives at
     <code>entity-peer-&lt;id&gt;</code>; each backend peer gets its own database. Extra
     <code>entity-peer-*</code> databases that no longer match the current identity are
     <em>orphans</em> — abandoned by a prior reset, still taking space.</p>
  <div id="idb"><div class="empty">probing…</div></div>

  <h2>Your data — localStorage <span class="tag data">your data</span></h2>
  <p class="note">The system seed (root of identity) and the key vault. Secret values are
     hidden — only presence and size are shown.</p>
  <div id="ls"><div class="empty">probing…</div></div>

  <h2>Your data — OPFS (Worker mode only) <span class="tag data">your data</span></h2>
  <p class="note">Origin-Private File System tree, used only when the app runs with
     <code>?worker=1</code>. Empty here means you're on the default main-thread IndexedDB arm.</p>
  <div id="opfs"><div class="empty">probing…</div></div>

  <h2>Transient — sessionStorage <span class="tag transient">transient</span></h2>
  <p class="note">Per-tab scratch (e.g. the WASM load-retry counter). Cleared when the tab closes.</p>
  <div id="ss"><div class="empty">probing…</div></div>

  <div class="foot">
    This page performs <b>no writes and no deletes</b> — it is the read-only report shown before any
    future confirm-gated reset / export (not yet available). Nothing leaves this machine.
  </div>
</div>
`;

            function render() {
                if (document.getElementById('entity-recovery')) return; // idempotent
                try {
                    var style = document.createElement('style');
                    style.id = 'recovery-style';
                    style.textContent = RECOVERY_CSS;
                    document.head.appendChild(style);
                    // Recovery owns the page — the WASM app does not boot in this
                    // mode (main.rs bails), so replacing the body is safe.
                    document.body.innerHTML = RECOVERY_BODY;
                    document.title = 'Entity Browser — Storage Inventory';
                    runProbes();
                } catch (err) {
                    try {
                        var pre = document.createElement('pre');
                        pre.id = 'entity-recovery';
                        pre.textContent = 'System Recovery failed to render: ' + err;
                        pre.setAttribute('style', 'position:fixed;inset:0;z-index:99999;color:#eee;background:#0c0c14;padding:20px;font:13px monospace;margin:0;');
                        document.body.appendChild(pre);
                    } catch (_) {}
                }
            }

            // The probing logic (ported verbatim from recovery-preview.html).
            // Self-contained, read-only; each probe independently try/caught.
            function runProbes() {
                const $ = (id) => document.getElementById(id);
                const fmtBytes = (n) => {
                    if (n == null || isNaN(n)) return "—";
                    if (n < 1024) return n + " B";
                    const u = ["KB","MB","GB","TB"]; let i = -1; let v = n;
                    do { v /= 1024; i++; } while (v >= 1024 && i < u.length - 1);
                    return v.toFixed(v < 10 ? 1 : 0) + " " + u[i];
                };
                const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
                const card = (name, meta, tag) =>
                    `<div class="card"><div class="name">${esc(name)}${tag||""}</div>` +
                    (meta ? `<div class="meta">${meta}</div>` : "") + `</div>`;
                const setEmpty = (el, msg) => { el.innerHTML = `<div class="empty">${esc(msg)}</div>`; };
                const setErr = (el, msg) => { el.innerHTML = `<div class="err">${esc(msg)}</div>`; };
                const shortId = (s) => (s && s.length > 18) ? s.slice(0, 8) + "…" + s.slice(-6) : (s || "?");
                // Peer mode → [pretty label, durability note]. Mirrors src/peer_mode.rs.
                const MODE_INFO = {
                    "frontend":       ["frontend · main-thread", "durable in the system IndexedDB (leader tab)"],
                    "backend-memory": ["backend · memory",       "ephemeral — data lost on reload"],
                    "backend-opfs":   ["backend · OPFS",          "durable in its own OPFS store"],
                };

                $("origin").textContent = location.origin;
                $("origin2").textContent = location.origin;
                if ($("origin3")) $("origin3").textContent = location.origin;
                $("ts").textContent = new Date().toLocaleString();

                // --- Storage summary: estimate + persisted ---
                (async () => {
                    const el = $("summary");
                    try {
                        let html = "";
                        if (navigator.storage && navigator.storage.estimate) {
                            const e = await navigator.storage.estimate();
                            const pct = e.quota ? Math.min(100, (e.usage / e.quota) * 100) : 0;
                            html += card("Disk usage",
                                `<div class="kv"><span>used <b>${fmtBytes(e.usage)}</b></span>` +
                                `<span>quota <b>${fmtBytes(e.quota)}</b></span></div>` +
                                `<div class="bar"><i style="width:${pct.toFixed(1)}%"></i></div>`);
                        }
                        let persisted = null;
                        if (navigator.storage && navigator.storage.persisted) {
                            persisted = await navigator.storage.persisted();
                        }
                        html += card("Durability",
                            persisted === null ? "persistence API unavailable"
                                : persisted ? "<b>persisted</b> — protected from automatic eviction"
                                : "<b>evictable</b> — the browser may clear this under storage pressure",
                            persisted === false ? '<span class="tag secret">evictable</span>' : "");
                        el.innerHTML = html || `<div class="empty">no summary APIs available</div>`;
                    } catch (e) { setErr(el, "summary failed: " + e); }
                })();

                // --- Service Workers ---
                (async () => {
                    const el = $("sw");
                    try {
                        if (!("serviceWorker" in navigator) || !navigator.serviceWorker.getRegistrations) {
                            return setEmpty(el, "Service Worker API unavailable");
                        }
                        const regs = await navigator.serviceWorker.getRegistrations();
                        if (!regs.length) return setEmpty(el, "no service workers registered");
                        el.innerHTML = regs.map((r) => {
                            const w = r.active || r.waiting || r.installing;
                            const state = w ? `${w.state}` : "none";
                            return card("Service Worker", `<div class="kv">` +
                                `<span>scope <b>${esc(r.scope)}</b></span>` +
                                `<span>script <b>${esc(w ? w.scriptURL.split('/').pop() : '—')}</b></span>` +
                                `<span>state <b>${esc(state)}</b></span></div>`);
                        }).join("");
                    } catch (e) { setErr(el, "service-worker probe failed: " + e); }
                })();

                // --- Cache Storage ---
                (async () => {
                    const el = $("caches");
                    try {
                        if (!("caches" in self)) return setEmpty(el, "Cache Storage API unavailable");
                        const names = await caches.keys();
                        if (!names.length) return setEmpty(el, "no caches");
                        const cards = [];
                        for (const name of names) {
                            try {
                                const c = await caches.open(name);
                                const reqs = await c.keys();
                                cards.push(card(name, `<div class="kv"><span><b>${reqs.length}</b> cached responses</span></div>`));
                            } catch (e) { cards.push(card(name, `<span class="err">unreadable: ${esc(e)}</span>`)); }
                        }
                        el.innerHTML = cards.join("");
                    } catch (e) { setErr(el, "cache probe failed: " + e); }
                })();

                // --- IndexedDB ---
                function openWithTimeout(name, ms) {
                    return new Promise((resolve) => {
                        let done = false;
                        const finish = (v) => { if (!done) { done = true; resolve(v); } };
                        const t = setTimeout(() => finish({ error: "timed out (locked by another tab?)" }), ms);
                        let req;
                        try { req = indexedDB.open(name); } catch (e) { clearTimeout(t); return finish({ error: String(e) }); }
                        req.onsuccess = () => { clearTimeout(t); finish({ db: req.result }); };
                        req.onerror = () => { clearTimeout(t); finish({ error: String(req.error) }); };
                        req.onblocked = () => { clearTimeout(t); finish({ error: "blocked (open in another tab)" }); };
                    });
                }
                function countStore(db, store) {
                    return new Promise((resolve) => {
                        try {
                            const tx = db.transaction(store, "readonly");
                            const rq = tx.objectStore(store).count();
                            rq.onsuccess = () => resolve(rq.result);
                            rq.onerror = () => resolve(null);
                        } catch (_) { resolve(null); }
                    });
                }
                (async () => {
                    const el = $("idb");
                    try {
                        if (!indexedDB.databases) {
                            return setEmpty(el, "indexedDB.databases() unavailable (older Safari) — cannot enumerate; named DBs still exist");
                        }
                        const dbs = await indexedDB.databases();
                        const entity = dbs.filter((d) => d.name && d.name.startsWith("entity-peer-"));
                        const others = dbs.filter((d) => !d.name || !d.name.startsWith("entity-peer-"));
                        if (!dbs.length) return setEmpty(el, "no IndexedDB databases");
                        const cards = [];
                        for (const d of entity) {
                            const r = await openWithTimeout(d.name, 2500);
                            if (r.error) { cards.push(card(d.name, `<span class="err">${esc(r.error)}</span>`)); continue; }
                            const db = r.db;
                            const stores = Array.from(db.objectStoreNames);
                            const parts = [];
                            for (const s of stores) {
                                const n = await countStore(db, s);
                                parts.push(`<span>${esc(s)} <b>${n == null ? "?" : n}</b></span>`);
                            }
                            db.close();
                            cards.push(card(d.name,
                                `<div class="kv"><span>version <b>${d.version ?? "?"}</b></span>${parts.join("")}</div>`));
                        }
                        for (const d of others) {
                            cards.push(card(d.name || "(unnamed)",
                                `<div class="kv"><span>version <b>${d.version ?? "?"}</b></span>` +
                                `<span class="tag transient">not Entity Browser</span></div>`));
                        }
                        el.innerHTML = cards.join("") +
                            (entity.length > 1 ? `<p class="legend">Note: more than one <code>entity-peer-*</code> database. ` +
                                `The current identity uses one; the rest are backend peers or orphans from a prior reset.</p>` : "");
                    } catch (e) { setErr(el, "IndexedDB probe failed: " + e); }
                })();

                // --- localStorage (secret-masked) ---
                (async () => {
                    const el = $("ls");
                    try {
                        const keys = Object.keys(localStorage);
                        if (!keys.length) return setEmpty(el, "localStorage empty");
                        const cards = keys.sort().map((k) => {
                            const raw = localStorage.getItem(k) || "";
                            const size = fmtBytes(new Blob([raw]).size);
                            // The key vault: line-oriented `peer_id|seed_hex|label|mode`. Only the
                            // SEED is secret — the peer id, mode, and label are safe to show.
                            if (k === "entity_peers") {
                                const rows = raw.split("\n").map((s) => s.trim()).filter(Boolean).map((line) => {
                                    const f = line.split("|");
                                    return { id: f[0] || "?", label: (f[2] || "").trim(), mode: f[3] || "frontend" };
                                }).filter((p) => !/^v\d+$/.test(p.id)); // skip the vault_codec version marker line
                                const list = rows.length ? rows.map((p) => {
                                    const info = MODE_INFO[p.mode] || [p.mode, ""];
                                    return `<div class="kv" style="margin-top:6px">` +
                                        `<span><b>${esc(shortId(p.id))}</b></span>` +
                                        `<span class="tag data">${esc(info[0])}</span>` +
                                        (p.label ? `<span>“${esc(p.label)}”</span>` : "") +
                                        (info[1] ? `<span style="color:#7e8696">${esc(info[1])}</span>` : "") +
                                        `<span>seed <b>hidden</b></span></div>`;
                                }).join("") : `<div class="empty">vault present but holds no peers</div>`;
                                return card(k, `<div class="kv"><span>private key vault</span>` +
                                    `<span><b>${rows.length}</b> peer${rows.length === 1 ? "" : "s"}</span>` +
                                    `<span>size <b>${size}</b></span></div>` + list,
                                    '<span class="tag secret">seeds hidden</span>');
                            }
                            // The root identity seed is fully secret — presence + size only.
                            if (k === "entity_system_seed") {
                                return card(k, `<div class="kv"><span>root identity seed (the system peer)</span>` +
                                    `<span>size <b>${size}</b></span><span>value <b>hidden</b></span></div>`,
                                    '<span class="tag secret">secret</span>');
                            }
                            // Everything else is a non-secret pref — safe to show the value.
                            const shown = raw.length > 80 ? raw.slice(0, 80) + "…" : raw;
                            return card(k, `<div class="kv"><span>size <b>${size}</b></span>` +
                                `<span>value <b>${esc(shown)}</b></span></div>`);
                        });
                        el.innerHTML = cards.join("");
                    } catch (e) { setErr(el, "localStorage probe failed: " + e); }
                })();

                // --- OPFS (Worker mode) ---
                (async () => {
                    const el = $("opfs");
                    try {
                        if (!navigator.storage || !navigator.storage.getDirectory) {
                            return setEmpty(el, "OPFS API unavailable");
                        }
                        const root = await navigator.storage.getDirectory();
                        const entries = [];
                        if (root.values) {
                            for await (const h of root.values()) entries.push(h);
                        }
                        if (!entries.length) return setEmpty(el, "OPFS root empty (default main-thread IDB arm — expected)");
                        el.innerHTML = entries.map((h) =>
                            card(h.name, `<div class="kv"><span>kind <b>${esc(h.kind)}</b></span></div>`)).join("");
                    } catch (e) { setEmpty(el, "OPFS not enumerable here: " + e); }
                })();

                // --- sessionStorage ---
                (async () => {
                    const el = $("ss");
                    try {
                        const keys = Object.keys(sessionStorage);
                        if (!keys.length) return setEmpty(el, "sessionStorage empty");
                        el.innerHTML = keys.sort().map((k) => {
                            const raw = sessionStorage.getItem(k) || "";
                            const shown = raw.length > 80 ? raw.slice(0, 80) + "…" : raw;
                            return card(k, `<div class="kv"><span>value <b>${esc(shown)}</b></span></div>`);
                        }).join("");
                    } catch (e) { setErr(el, "sessionStorage probe failed: " + e); }
                })();
            }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', render);
            else render();
        })();
    </script>
    <script>
        // Auto-retry WASM load failures caused by WebKitGTK resource loader timeouts.
        // Trunk's generated module script does `await init()` with no error handling —
        // if WebKit's internal loader times out on the WASM binary, the promise
        // rejects and the ES module dies (can't be re-executed). The only recovery is
        // a page reload, so we do it automatically and transparently.
        (function() {
            // In System Recovery mode the page is a JS-only BIOS that must work
            // even when the WASM can't load — never auto-reload on a WASM
            // failure here (that would loop on the very thing the user came to
            // inspect). The recovery renderer owns the page.
            if (window.__ENTITY_RECOVERY__) return;
            var MAX_RETRIES = 3;
            var KEY = 'entity_browser_wasm_retry';
            var retryCount = parseInt(sessionStorage.getItem(KEY) || '0');
            // Only the WASM *load* phase auto-reloads on a rejection. Once the
            // app has started, a stray runtime rejection (e.g. a denied
            // clipboard write) must NOT reload and destroy the session — that
            // turned a harmless `clipboard.writeText` rejection into a full app
            // reboot. Flipped true on TrunkApplicationStarted below.
            var appStarted = false;

            // Update loading text if retrying.
            if (retryCount > 0) {
                document.addEventListener('DOMContentLoaded', function() {
                    var el = document.getElementById('loading-status');
                    if (el) el.textContent = 'Loading Entity Browser (retry ' + retryCount + '/' + MAX_RETRIES + ')...';
                });
            }

            // WASM load failure → auto-retry or show manual reload as last resort.
            window.addEventListener('unhandledrejection', function(event) {
                // A rejection AFTER the app started is a runtime issue, not a
                // load failure — log it, but never reload (that would wipe the
                // live session). The load-failure auto-retry below applies only
                // before TrunkApplicationStarted.
                if (appStarted) {
                    console.warn('[Entity Browser] unhandled rejection (post-start, ignored):', event.reason);
                    return;
                }
                console.error('[Entity Browser] WASM load failed:', event.reason);
                if (retryCount < MAX_RETRIES) {
                    sessionStorage.setItem(KEY, String(retryCount + 1));
                    console.log('[Entity Browser] Auto-retrying (' + (retryCount + 1) + '/' + MAX_RETRIES + ')...');
                    setTimeout(function() { location.reload(); }, 500);
                } else {
                    sessionStorage.removeItem(KEY);
                    var loading = document.getElementById('loading');
                    if (loading) loading.style.display = '';
                    var retry = document.getElementById('loading-retry');
                    if (retry) retry.style.display = 'block';
                }
            });

            // Clear retry counter on successful startup, and stop treating
            // unhandled rejections as load failures (the app is now running).
            window.addEventListener('TrunkApplicationStarted', function() {
                sessionStorage.removeItem(KEY);
                appStarted = true;
            });
        })();
    </script>
    <script>
        // Service Worker registration for offline app-shell cache.
        // Caches static assets (HTML/JS/WASM/loader) on first online
        // load so subsequent reloads work even when the network is
        // unreachable. The peer itself is offline-by-design — only
        // these static assets need network on first visit.
        //
        // SW file: /sw.js (Trunk copy-file from assets/sw.js).
        // Details: assets/sw.js + the GAP-5 persistence investigation.
        //
        // Test-friendly: hostname `e2e-no-sw` disables registration so
        // E2E test environments without HTTPS / secure-context can opt
        // out without changing the SW file itself. Browsers also
        // silently refuse SW registration over plain http unless on
        // `localhost` / `127.0.0.1`.
        //
        // Update handling: when a new deploy lands, the browser installs a
        // new SW version in the background. We surface it. DEFAULT is a
        // manual "Reload" banner so we never interrupt a working session
        // (auto-reloading mid-edit is the footgun). Flip AUTO_RELOAD_ON_UPDATE
        // to true to reload automatically as soon as the new version is ready.
        // (Network-first index.html already serves the new app code on the
        // first reload regardless — this is about prompting the reload, not
        // delivering the bytes.) See the SW-cache-and-durability review.
        var AUTO_RELOAD_ON_UPDATE = false;

        function showUpdateBanner() {
            if (document.getElementById('update-banner')) return; // idempotent
            var banner = document.createElement('div');
            banner.id = 'update-banner';
            banner.setAttribute('style',
                'display:flex;align-items:center;gap:12px;padding:8px 14px;background:#13283a;' +
                'color:#eee;border-bottom:1px solid #2f6ea3;' +
                'font:13px/1.4 system-ui,-apple-system,sans-serif;');
            var text = document.createElement('span');
            text.textContent = 'A new version of Entity Browser is available.';
            text.setAttribute('style', 'flex:1;');
            banner.appendChild(text);
            var reload = document.createElement('button');
            reload.textContent = 'Reload';
            reload.setAttribute('style',
                'padding:3px 12px;cursor:pointer;background:#2f6ea3;color:#fff;' +
                'border:1px solid #4a90c2;border-radius:4px;font-size:12px;');
            reload.addEventListener('click', function() { location.reload(); });
            banner.appendChild(reload);
            var later = document.createElement('button');
            later.textContent = 'Later';
            later.setAttribute('style',
                'padding:3px 10px;cursor:pointer;background:transparent;color:#eee;' +
                'border:1px solid currentColor;border-radius:4px;font-size:12px;');
            later.addEventListener('click', function() { banner.remove(); });
            banner.appendChild(later);
            // Top of the layout, above the status bar (fall back to <body>) —
            // same placement as the storage banner (storage_durability.rs).
            var layout = document.getElementById('app-layout');
            if (layout) { layout.insertBefore(banner, layout.firstChild); }
            else if (document.body) { document.body.insertBefore(banner, document.body.firstChild); }
        }

        if ('serviceWorker' in navigator && location.hostname !== 'e2e-no-sw') {
            // True only if a SW already controls this page at load time, i.e.
            // a real UPDATE is possible (vs the very first install). Guards the
            // auto-reload path against reloading on first-ever visit (our SW
            // uses clients.claim, which fires controllerchange on first claim).
            var hadController = !!navigator.serviceWorker.controller;
            var refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', function() {
                if (AUTO_RELOAD_ON_UPDATE && hadController && !refreshing) {
                    refreshing = true;
                    location.reload();
                }
            });
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').then(
                    function(reg) {
                        console.info('[Entity Browser] Service Worker registered, scope:', reg.scope);
                        // A newly-installed worker while one already controls
                        // the page = an update became available.
                        reg.addEventListener('updatefound', function() {
                            var sw = reg.installing;
                            if (!sw) return;
                            sw.addEventListener('statechange', function() {
                                if (sw.state === 'installed' &&
                                    navigator.serviceWorker.controller &&
                                    !AUTO_RELOAD_ON_UPDATE) {
                                    showUpdateBanner();
                                }
                            });
                        });
                    },
                    function(err) {
                        console.warn('[Entity Browser] Service Worker registration failed:', err);
                    }
                );
            });
        }
    </script>
    <style>
        /* Boot backstop for native-control theming. The per-theme
           color-scheme is set by theme_tokens::install_root once WASM
           boots; this static `dark` (the default theme) covers the brief
           pre-boot window so WebKitGTK (Tauri) doesn't flash a light-themed
           <select> popup under the dark UI. See theme_tokens::root_block. */
        :root { color-scheme: dark; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-body, #111);
            color: var(--text, #e0e0e0);
            font-family: var(--font-ui, system-ui, -apple-system, sans-serif);
        }

        /* Top status bar — always visible */
        #status-bar {
            height: 28px;
            background: var(--bg, #1a1a2e);
            border-bottom: 1px solid var(--border, #333);
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 12px;
            color: var(--text-dim, #888);
            flex-shrink: 0;
            gap: 16px;
        }

        #status-bar .mode-label {
            color: var(--accent, #90d0ff);
            font-weight: bold;
        }

        /* Site Mode overlay toggle — pushed to the right edge of the bar. */
        #site-toggle {
            margin-left: auto;
            background: var(--surface, #2a2a4e);
            color: var(--accent-2, #c0c0e0);
            border: 1px solid var(--border-bold, #555);
            border-radius: 4px;
            padding: 2px 10px;
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
        }
        #site-toggle:hover { background: #34345e; }

        /* Main layout */
        #app-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #app-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #dom-layer {
            position: absolute;
            inset: 4px;
            border: 1px solid var(--border, #333);
            border-radius: 4px;
            overflow: hidden;
        }

        .mode-dom #dom-layer { display: block; }

        /* Site Mode overlay — a full-pane sibling of #dom-layer. Hidden
           until the container carries `mode-site`; in site mode the
           entity-browser chrome (#dom-layer) hides and the overlay shows
           edge-to-edge so it reads as a normal site. Mirrors the existing
           `.mode-dom #dom-layer` idiom (no new rendering machinery). */
        #site-layer {
            position: absolute;
            inset: 0;
            overflow: auto;
            background: var(--overlay-bg, #101018);
            display: none;
        }
        .mode-site #dom-layer { display: none; }
        .mode-site #site-layer { display: block; }

        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-body, #111);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted, #c0c0c0);
            font-family: monospace;
            font-size: 16px;
            z-index: 100;
        }
        .loading .recovery-link {
            position: absolute;
            bottom: 22px; left: 0; right: 0;
            text-align: center;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            color: var(--text-faint, #7e8696);
            text-decoration: none;
        }
        .loading .recovery-link:hover { color: var(--accent, #9fb4cf); text-decoration: underline; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div style="text-align:center">
            <div id="loading-status">Loading Entity Browser...</div>
            <div id="loading-retry" style="display:none;margin-top:16px">
                <div style="color:#f88;margin-bottom:8px">WASM failed to load after multiple attempts.</div>
                <button onclick="sessionStorage.removeItem('entity_browser_wasm_retry');location.reload()" style="padding:6px 16px;cursor:pointer;background:var(--surface, #2a2a4e);color:#ccc;border:1px solid var(--text-faint, #666);border-radius:4px">Try Again</button>
            </div>
        </div>
        <!-- Always-visible escape hatch: if boot wedges (commonly a stale
             service worker pinning an old/partial bundle), System Recovery
             renders WITHOUT booting WASM and explains how to recover. -->
        <a class="recovery-link" href="?systemrecovery=1">Stuck here? Open System Recovery →</a>
    </div>
    <div id="app-layout">
        <div id="status-bar">
            <span>Entity Browser</span>
            <span class="mode-label" id="mode-display">DOM</span>
            <button id="site-toggle" type="button" title="View site">⛶</button>
        </div>
        <div id="app-container" class="mode-dom">
            <div id="dom-layer"></div>
            <div id="site-layer"></div>
        </div>
    </div>
</body>
</html>
