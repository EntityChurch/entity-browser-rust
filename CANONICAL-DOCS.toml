# Canonical docs manifest — entity-browser-rust (Entity Browser).
# Lists the PUBLISHABLE, durable doc surface in reading order. Absence is the
# honest default: dated handoffs/audits/reviews under docs/plans/, docs/archive/,
# and *REVIEW*/*AUDIT*/*DESIGN* files are ephemeral and deliberately NOT listed.
# Schema: docs/release-readiness/CANONICAL-DOCS-FORMAT.md (meta repo).

[project]
name   = "Entity Browser"
slug   = "entity-browser-rust"
repo   = "entity-browser-rust"
github = "https://github.com/EntityChurch/entity-browser-rust"
intro  = """
Entity Browser is a binding/app in the entity-systems stack: a DOM-primary Rust
application built on top of the Rust reference implementation (entity-core-rust)
and its SDK. It is a worked reference example of building an entity-backed
application — a multi-window manager, content sites, and embedded HTML/JS apps,
all with the entity tree as the single source of truth — and ships as a WASM
browser app (primary) and a Tauri desktop shell. It depends on entity-core-rust;
nothing depends on it. The only rendering path is HTML DOM (the legacy
egui/native renderer was removed). This is a 0.8 research preview — a reference paradigm, not a
mandate, and not a hardened production deployment. Confidence: the browser path
is solid and exercised; Tauri/WebKitGTK durability is exploratory (see README
release notes).
"""

